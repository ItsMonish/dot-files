general {
    ignore_empty_input = true,
}

auth {
    pam_enabled = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor = 
    path = $HOME/.config/hypr/lock.jpg
    blur_size = 2
    blur_passes = 2
}

input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(100, 114, 125, 0.4)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = Times New Roman
    placeholder_text = <i><span foreground="##ffffff99">Password</span></i>
    hide_input = false
    position = 0, -225
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M:%S")</span>"
    color = rgba(216, 222, 233, 0.70)
    font_size = 130
    font_family = Times New Roman
    position = 0, 240
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %d %B")"
    color = rgba(216, 222, 233, 0.70)
    font_size = 30
    font_family = Times New Roman
    position = 0, 105
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[] echo "$(shuf -n 1 $HOME/Sources/scripts/assets/quotes.txt)"
    color = rgba(216, 222, 233, 0.70)
    font_size = 25
    font_family = Times New Roman
    position = 0, -130
    halign = center
    valign = center
}
